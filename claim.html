<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Create your account — SKLZ Labs</title>
<style>
  :root{--bg:#080A0F;--panel:#0F131C;--panel2:#141A26;--line:#1E2735;--ink:#EAEEF6;
    --muted:#8B94A8;--dim:#5B6377;--gold:#F5A623;--gold2:#FFC24B;--blue:#1DA9E0;--green:#34D399;--red:#F87171;
    --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;--sans:'Inter',-apple-system,system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh;
    display:grid;place-items:center;padding:20px}
  .card{max-width:460px;width:100%;background:var(--panel);border:1px solid var(--line);
    border-radius:18px;padding:32px}
  .tick{width:54px;height:54px;border-radius:50%;background:rgba(52,211,153,.12);
    border:1px solid rgba(52,211,153,.4);display:grid;place-items:center;font-size:24px;
    margin:0 auto 14px;color:var(--green)}
  h1{font-size:21px;text-align:center;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:13px;margin:9px 0 20px;line-height:1.6;text-align:center}
  label{display:block;font-family:var(--mono);font-size:10px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.06em;margin:13px 0 5px}
  input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:8px;
    padding:11px 12px;color:var(--ink);font-size:14px}
  input:focus{outline:none;border-color:var(--gold)}
  .big{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#08101A;border:none;
    border-radius:9px;padding:13px;font-weight:700;font-size:14.5px;cursor:pointer;
    width:100%;margin-top:18px}
  .big:disabled{opacity:.5}
  .msg{margin-top:14px;font-size:13px;line-height:1.6;text-align:center;display:none;
    border-radius:9px;padding:12px}
  .ok{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);color:var(--green)}
  .err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3);color:var(--red)}
  .fine{font-family:var(--mono);font-size:9.5px;color:var(--dim);margin-top:16px;
    text-align:center;line-height:1.7}
  a{color:var(--blue)}
</style>
</head>
<body>
<div class="card">
  <div class="tick">✓</div>
  <h1>Payment received — create your account</h1>
  <div class="sub">One last step: set a password and your SKLZ Labs account is ready,
    with your purchase already attached to it.</div>
  <label>Display name</label>
  <input id="name" placeholder="How should we greet you?"/>
  <label>Password</label>
  <input id="pw" type="password" placeholder="Choose a strong password"/>
  <button class="big" id="go" onclick="claim()">Create account & activate →</button>
  <div class="msg" id="msg"></div>
  <div class="fine">The email you used at checkout becomes your login.<br>
    Already have an account with that email? We'll attach the purchase to it automatically.</div>
</div>
<script>
  const API="https://api.sklzlabs.com";
  const sid=new URLSearchParams(location.search).get('sid')||'';
  function show(cls,html){const m=document.getElementById('msg');
    m.className='msg '+cls;m.style.display='block';m.innerHTML=html}
  if(!sid){show('err','Missing checkout reference. Open this page from the link after payment, or contact support.');}
  async function claim(){
    const pw=document.getElementById('pw').value;
    if(pw.length<8){show('err','Password needs at least 8 characters.');return}
    const b=document.getElementById('go');b.disabled=true;b.textContent='Creating…';
    try{
      const r=await fetch(API+'/api/billing/claim',{method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({session_id:sid,password:pw,
          display_name:document.getElementById('name').value.trim()})});
      const d=await r.json();
      if(!r.ok){b.disabled=false;b.textContent='Create account & activate →';
        show('err',d.detail||'Could not create the account.');return}
      if(d.existing_account){
        show('ok',`Your <b>${d.plan}</b> is attached to your existing account (${d.email}).<br>
          <a href="/login.html">Log in with your usual password →</a>`);
      }else if(d.email_confirmation_required){
        show('ok',`Account created and <b>${d.plan}</b> activated!<br>
          We sent a confirmation link to <b>${d.email}</b> — click it, then
          <a href="/login.html">log in</a>.`);
      }else{
        show('ok',`Account ready — <b>${d.plan}</b> active. <a href="/login.html">Log in →</a>`);
      }
      b.style.display='none';
    }catch(e){b.disabled=false;b.textContent='Create account & activate →';
      show('err','Network error — your payment is safe; try again in a moment.')}
  }
</script>
</body>
</html>
