<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Performance — SKLZ Labs</title>
<style>
  :root{--bg:#080A0F;--panel:#0F131C;--panel2:#141A26;--line:#1E2735;--ink:#EAEEF6;--muted:#8B94A8;--dim:#5B6377;--gold:#F5A623;--green:#34D399;--red:#F87171;--blue:#1DA9E0;--mono:'JetBrains Mono',ui-monospace,monospace;--sans:'Inter',system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh;padding:24px}
  .wrap{max-width:820px;margin:0 auto}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700}
  .brand img{height:46px}
  .badge{font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:6px;text-transform:uppercase;letter-spacing:.04em}
  .badge.live{background:rgba(52,211,153,.14);color:var(--green)}
  .badge.demo{background:rgba(29,169,224,.14);color:var(--blue)}
  .badge.prop{background:rgba(245,166,35,.14);color:var(--gold)}
  .acct{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px}
  .acct h1{font-size:22px;margin-bottom:10px}
  .meta{display:flex;flex-wrap:wrap;gap:8px 20px;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .meta b{color:var(--ink);font-weight:600}
  .src{margin-top:12px;font-family:var(--mono);font-size:11px;padding:8px 12px;border-radius:8px;background:var(--panel2);color:var(--muted)}
  .src.tracked{border-left:3px solid var(--green)}
  .src.logged{border-left:3px solid var(--gold)}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  @media(max-width:640px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  .kpi .k{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;color:var(--dim)}
  .kpi .v{font-family:var(--mono);font-size:24px;font-weight:700;margin-top:6px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px}
  .card h2{font-family:var(--mono);font-size:11px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
  svg{width:100%;height:200px}
  .foot{text-align:center;font-family:var(--mono);font-size:10px;color:var(--dim);line-height:1.8;margin-top:20px}
  .empty{text-align:center;color:var(--dim);font-family:var(--mono);font-size:13px;padding:60px 20px}
  a{color:var(--gold);text-decoration:none}
</style></head>
<body>
<div class="wrap" id="wrap"><div class="empty">Loading performance…</div></div>
<script>
  const API="https://api.sklzlabs.com";
  const code=location.pathname.split('/p/')[1]||location.hash.slice(1)||new URLSearchParams(location.search).get('c');
  function esc(s){const d=document.createElement('div');d.textContent=s??'';return d.innerHTML}
  function money(n){return (n>=0?'+':'')+'$'+Math.abs(+n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}
  async function load(){
    if(!code){document.getElementById('wrap').innerHTML='<div class="empty">No performance code in the link.</div>';return;}
    try{
      const r=await fetch(API+'/api/journal/public/'+encodeURIComponent(code));
      if(!r.ok){document.getElementById('wrap').innerHTML='<div class="empty">This performance page is private or does not exist.</div>';return;}
      const d=await r.json();render(d);
    }catch(e){document.getElementById('wrap').innerHTML='<div class="empty">Could not load performance.</div>';}
  }
  function equityCurve(a){
    const eq=a.equity_curve||[];
    if(eq.length<2)return '<div style="color:var(--dim);font-family:var(--mono);font-size:12px;text-align:center;padding:40px">Not enough closed trades yet.</div>';
    const w=780,h=200,min=Math.min(...eq),max=Math.max(...eq),rng=(max-min)||1;
    const pts=eq.map((v,i)=>[(i/(eq.length-1))*w,h-((v-min)/rng)*h*0.9-10]);
    const path=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
    const up=eq[eq.length-1]>=eq[0];
    return '<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none"><path d="'+path+'" fill="none" stroke="'+(up?'var(--green)':'var(--red)')+'" stroke-width="2"/></svg>';
  }
  function render(d){
    const a=d.account,an=d.analytics||{};
    const kind=(a.kind||'demo').toLowerCase();
    const src=d.data_source==='MT5-tracked'?'tracked':d.data_source==='manually logged'?'logged':'';
    const srcText=d.data_source==='MT5-tracked'
      ?'● Data pulled directly from MT5 deal history — not hand-entered.'
      :d.data_source==='manually logged'
      ?'Trades on this account are self-reported (manually logged by the trader).'
      :'Mix of MT5-tracked and manually logged trades.';
    document.getElementById('wrap').innerHTML=
      '<div class="top"><div class="brand"><img src="/sklz-logo.png"/>SKLZ Labs</div>'+
        '<span class="badge '+kind+'">'+esc(a.kind||'demo')+'</span></div>'+
      '<div class="acct"><h1>'+esc(a.label)+'</h1>'+
        '<div class="meta">'+
          (a.broker?'<span>Broker <b>'+esc(a.broker)+'</b></span>':'')+
          '<span>Platform <b>'+esc(a.platform)+'</b></span>'+
          (a.server?'<span>Server <b>'+esc(a.server)+'</b></span>':'')+
          (a.account_no?'<span>Account <b>#'+esc(a.account_no)+'</b></span>':'')+
        '</div>'+
        '<div class="src '+src+'">'+srcText+'</div></div>'+
      '<div class="kpis">'+
        '<div class="kpi"><div class="k">Net P/L</div><div class="v" style="color:'+((an.total_pnl||0)>=0?'var(--green)':'var(--red)')+'">'+money(an.total_pnl||0)+'</div></div>'+
        '<div class="kpi"><div class="k">Win rate</div><div class="v">'+Math.round((an.win_rate||0)*100)+'%</div></div>'+
        '<div class="kpi"><div class="k">Trades</div><div class="v">'+(d.trade_count||0)+'</div></div>'+
        '<div class="kpi"><div class="k">Profit factor</div><div class="v">'+(an.profit_factor!=null?an.profit_factor:'—')+'</div></div>'+
      '</div>'+
      '<div class="card"><h2>Equity curve</h2>'+equityCurve(an)+'</div>'+
      '<div class="foot">Performance shared via SKLZ Labs · '+srcText.replace('● ','')+'<br>'+
        'Past performance does not guarantee future results · Trading involves risk of loss<br>'+
        '<a href="/">Build your own honest track record → sklzlabs.com</a></div>';
  }
  load();
</script>
<script src="/sklz-i18n.js" defer></script>
</body></html>
