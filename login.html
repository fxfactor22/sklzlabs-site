<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — SKLZ Labs</title>
<style>
  :root{
    --bg:#080A0F;--panel:#0F131C;--panel-2:#141A26;--line:#1E2735;
    --ink:#EAEEF6;--muted:#8B94A8;--dim:#5B6377;
    --gold:#F5A623;--blue:#1DA9E0;
    --mono:'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace;
    --sans:'Inter','SF Pro Text',-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);
    min-height:100vh;display:grid;place-items:center;padding:24px}
  .grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.4;
    background-image:linear-gradient(#1E2735 1px,transparent 1px),
      linear-gradient(90deg,#1E2735 1px,transparent 1px);background-size:52px 52px;
    mask-image:radial-gradient(ellipse 70% 50% at 50% 0%,#000 20%,transparent 70%);
    -webkit-mask-image:radial-gradient(ellipse 70% 50% at 50% 0%,#000 20%,transparent 70%)}
  .card{position:relative;z-index:1;width:100%;max-width:400px;
    background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:36px 32px;box-shadow:0 40px 80px -40px rgba(0,0,0,.8)}
  .logo{display:block;height:64px;margin:0 auto 8px}
  .tabs{display:flex;gap:4px;background:var(--bg);border:1px solid var(--line);
    border-radius:10px;padding:4px;margin:22px 0 24px}
  .tab{flex:1;text-align:center;padding:9px;border-radius:7px;font-size:14px;
    font-family:var(--mono);color:var(--muted);cursor:pointer;border:none;background:none;
    transition:all .2s}
  .tab.active{background:var(--panel-2);color:var(--ink)}
  label{display:block;font-size:12px;font-family:var(--mono);color:var(--muted);
    letter-spacing:.05em;margin:16px 0 7px;text-transform:uppercase}
  input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:9px;
    padding:12px 14px;color:var(--ink);font-family:var(--mono);font-size:14px}
  input:focus{outline:none;border-color:var(--gold)}
  .btn{width:100%;margin-top:24px;padding:13px;border:none;border-radius:9px;
    background:linear-gradient(100deg,var(--gold),var(--blue));color:#04120D;
    font-family:var(--mono);font-weight:700;font-size:14px;cursor:pointer;
    transition:transform .15s,box-shadow .2s}
  .btn:hover{transform:translateY(-1px);box-shadow:0 0 0 3px rgba(245,166,35,.2)}
  .btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
  .msg{margin-top:16px;font-size:13px;font-family:var(--mono);text-align:center;
    min-height:18px}
  .msg.err{color:#F87171}.msg.ok{color:#34D399}
  .foot{margin-top:22px;text-align:center;font-size:12px;color:var(--dim)}
  .foot a{color:var(--muted)}
  .hint{font-size:11px;color:var(--dim);font-family:var(--mono);margin-top:6px}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="card">
  <a href="/"><img src="./sklz-logo.png" alt="SKLZ Labs" class="logo"/></a>
  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="mode('login')">Log in</button>
    <button class="tab" id="tab-signup" onclick="mode('signup')">Sign up</button>
  </div>

  <div id="name-field" style="display:none">
    <label for="name">Display name</label>
    <input id="name" type="text" placeholder="Your name" autocomplete="name"/>
  </div>

  <label for="email">Email</label>
  <input id="email" type="email" placeholder="you@email.com" autocomplete="email"/>

  <label for="password">Password</label>
  <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
  <div class="hint" id="pw-hint" style="display:none">At least 8 characters.</div>

  <button class="btn" id="submit" onclick="submit()">Log in</button>
  <div class="msg" id="msg"></div>

  <div class="foot">
    Software only · Not financial advice<br>
    <a href="/">← Back to sklzlabs.com</a>
  </div>
</div>

<script>
  const API_BASE = "https://api.sklzlabs.com";
  let current = "login";

  function mode(m){
    current = m;
    document.getElementById('tab-login').classList.toggle('active', m==='login');
    document.getElementById('tab-signup').classList.toggle('active', m==='signup');
    document.getElementById('name-field').style.display = m==='signup'?'block':'none';
    document.getElementById('pw-hint').style.display = m==='signup'?'block':'none';
    document.getElementById('submit').textContent = m==='signup'?'Create account':'Log in';
    document.getElementById('password').autocomplete = m==='signup'?'new-password':'current-password';
    setMsg('','');
  }

  function setMsg(text,cls){
    const el=document.getElementById('msg');
    el.textContent=text; el.className='msg '+(cls||'');
  }

  async function submit(){
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value;
    const name=document.getElementById('name').value.trim();
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){setMsg('Enter a valid email','err');return}
    if(current==='signup' && password.length<8){setMsg('Password must be at least 8 characters','err');return}
    if(!password){setMsg('Enter your password','err');return}

    const btn=document.getElementById('submit');
    btn.disabled=true; setMsg('Working…','');
    const path = current==='signup' ? '/api/auth/signup' : '/api/auth/login';
    const body = current==='signup'
      ? {email,password,display_name:name||null}
      : {email,password};

    try{
      const r=await fetch(API_BASE+path,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify(body)
      });
      const data=await r.json();
      if(!r.ok){
        setMsg(data.detail || 'Something went wrong','err');
        btn.disabled=false; return;
      }
      if(data.email_confirmation_required){
        setMsg('Check your email to confirm your account, then log in.','ok');
        btn.disabled=false; mode('login'); return;
      }
      // store session
      localStorage.setItem('sklz_access', data.access_token||'');
      localStorage.setItem('sklz_refresh', data.refresh_token||'');
      // if this was a signup via a referral link, attribute it (fire-and-forget)
      if(current==='signup'){
        const ref=localStorage.getItem('sklz_ref');
        const uid=(data.user&&(data.user.id))||data.user_id||'';
        if(ref && uid){
          try{ await fetch(API_BASE+'/api/affiliate/attribute',{
            method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({code:ref,new_user_id:uid,new_user_email:email})}); }
          catch(e){}
          localStorage.removeItem('sklz_ref');
        }
      }
      setMsg('Success — redirecting…','ok');
      window.location.href='/dashboard.html';
    }catch(err){
      setMsg('Network error. Please try again.','err');
      btn.disabled=false;
    }
  }

  // Enter key submits
  document.addEventListener('keydown',e=>{if(e.key==='Enter')submit()});
</script>
<!-- ISKRA AI webchat widget -->
<script>
(function(){
  var SLUG='sklz', API='https://www.iskra.marketing/api/chat', CONV=null, open=false, greeted=false, busy=false;
  try{ CONV=localStorage.getItem('iskra_conv_'+SLUG)||null; }catch(e){}
  var css=document.createElement('style');
  css.textContent='#ikFab{position:fixed;right:20px;bottom:20px;z-index:99990;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#0ea5e9);color:#fff;border:0;font-size:23px;cursor:pointer;box-shadow:0 10px 28px rgba(0,0,0,.35)}#ikPanel{position:fixed;right:18px;bottom:90px;z-index:99991;width:min(360px,calc(100vw - 28px));height:min(500px,calc(100vh - 120px));background:#0f1523;border:1px solid #223;border-radius:16px;box-shadow:0 22px 60px rgba(0,0,0,.5);display:none;flex-direction:column;overflow:hidden;font-family:system-ui,sans-serif}#ikPanel.on{display:flex}.ikHd{background:#141b2e;color:#fff;padding:13px 15px;display:flex;align-items:center;gap:9px}.ikHd .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#0ea5e9);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px}.ikHd b{font-size:14px;display:block}.ikHd span{font-size:11px;color:#7dd3fc}.ikHd .x{margin-left:auto;background:none;border:0;color:#fff;font-size:17px;cursor:pointer;opacity:.8}.ikMs{flex:1;overflow-y:auto;padding:12px;background:#0b1020;display:flex;flex-direction:column;gap:9px}.ikM{max-width:84%;padding:9px 12px;border-radius:12px;font-size:13px;line-height:1.55;white-space:pre-wrap;color:#e6ecf7}.ikM.b{background:#141b2e;border:1px solid #223;border-bottom-left-radius:4px;align-self:flex-start}.ikM.u{background:#1d4ed8;border-bottom-right-radius:4px;align-self:flex-end}.ikIn{display:flex;gap:7px;padding:9px;border-top:1px solid #223;background:#0f1523}.ikIn input{flex:1;border:1px solid #2a3550;background:#0b1020;color:#e6ecf7;border-radius:999px;padding:9px 14px;font-size:13px;outline:none}.ikIn button{background:#22c55e;color:#06220f;border:0;border-radius:50%;width:38px;height:38px;font-size:14px;cursor:pointer;flex-shrink:0}.ikTy{display:inline-flex;gap:4px;padding:10px 13px;background:#141b2e;border:1px solid #223;border-radius:12px;align-self:flex-start}.ikTy i{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:ikp 1s infinite}.ikTy i:nth-child(2){animation-delay:.16s}.ikTy i:nth-child(3){animation-delay:.32s}@keyframes ikp{0%,100%{opacity:.3}50%{opacity:1}}';
  document.head.appendChild(css);
  var fab=document.createElement('button'); fab.id='ikFab'; fab.textContent='\uD83D\uDCAC'; fab.setAttribute('aria-label','Chat');
  var p=document.createElement('div'); p.id='ikPanel';
  p.innerHTML='<div class="ikHd"><div class="av">S</div><div><b>SKLZ AI</b><span>Ask about bots, tools & pricing</span></div><button class="x">\u2715</button></div><div class="ikMs" id="ikMs"></div><div class="ikIn"><input id="ikI" placeholder="Ask anything\u2026"/><button id="ikGo">\u27A4</button></div>';
  document.body.appendChild(fab); document.body.appendChild(p);
  function add(t,w){var m=document.getElementById('ikMs'),d=document.createElement('div');d.className='ikM '+w;d.textContent=t;m.appendChild(d);m.scrollTop=m.scrollHeight;}
  function typing(on){var m=document.getElementById('ikMs'),e=document.getElementById('ikTy');if(e)e.remove();if(on){var d=document.createElement('div');d.className='ikTy';d.id='ikTy';d.innerHTML='<i></i><i></i><i></i>';m.appendChild(d);m.scrollTop=m.scrollHeight;}}
  function send(){
    if(busy)return; var i=document.getElementById('ikI'),q=(i.value||'').trim(); if(q==='')return;
    i.value=''; add(q,'u'); typing(true); busy=true;
    fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tenantSlug:SLUG,channel:'webchat',message:q,conversationId:CONV})})
    .then(function(r){return r.json();}).then(function(d){
      typing(false); busy=false;
      if(d&&d.conversationId){CONV=d.conversationId;try{localStorage.setItem('iskra_conv_'+SLUG,CONV)}catch(e){}}
      add((d&&(d.reply||d.error))||'Sorry \u2014 something went wrong.','b');
    }).catch(function(){typing(false);busy=false;add('Connection problem \u2014 please try again.','b');});
  }
  fab.onclick=function(){open=(open===false);p.classList.toggle('on',open);if(open){if(greeted===false){greeted=true;add('Welcome to SKLZ Labs \uD83D\uDC4B I am SKLZ AI. Ask me about our MT5 bots, indicators, analytics, pricing \u2014 or join the copy-trading waitlist.','b');}document.getElementById('ikI').focus();}};
  p.querySelector('.x').onclick=function(){open=false;p.classList.remove('on');};
  document.getElementById('ikGo').onclick=send;
  document.getElementById('ikI').addEventListener('keydown',function(e){if(e.key==='Enter')send();});
})();
</script>
<!-- /ISKRA widget -->
<script src="/sklz-i18n.js" defer></script>
</body>
</html>
